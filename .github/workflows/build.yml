# Redmi AX5 (IPQ6000/IPQ0501) OpenWRT 全自动编译配置（AdGuardHome 极简版）
name: Redmi AX5 IPQ6000 Build

# 触发条件：手动触发 + 每周日自动编译（取消推送触发，避免误操作）
on:
  workflow_dispatch:  # 仅保留手动触发，更可控
  schedule:
    - cron: '0 0 * * 0'  # 每周日 0 点自动编译

# 编译环境配置（适配 IPQ6000 架构）
jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write  # 授予 Releases 上传权限
    steps:
      # 步骤1：安装 IPQ6000 编译专属依赖
      - name: Install Dependencies
        run: |
          sudo apt update && sudo apt upgrade -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget \
          libelf-dev libtool-bin autoconf automake texinfo patch pkg-config libglib2.0-dev \
          libfuse-dev curl swig upx-ucl antlr3 gperf device-tree-compiler

      # 步骤2：克隆 ImmortalWRT 源码（IPQ6000 适配最优）
      - name: Clone ImmortalWRT Source
        run: |
          git clone --depth 1 --branch openwrt-23.05 https://github.com/immortalwrt/immortalwrt.git openwrt
          cd openwrt
          # 更新 feeds 并安装（适配 IPQ6000 驱动）
          ./scripts/feeds update -a && ./scripts/feeds install -a

      # 步骤3：配置 Redmi AX5 (IPQ0501) 专属参数
      - name: Configure Redmi AX5 (IPQ6000)
        run: |
          cd openwrt
          # 生成 IPQ0501 架构 + Redmi AX5 机型配置
          cat > .config << EOF
          CONFIG_TARGET_ipq0501=y
          CONFIG_TARGET_ipq0501_generic=y
          CONFIG_TARGET_ipq0501_generic_DEVICE_xiaomi_redmi-ax5=y
          # 核心功能保留
          CONFIG_LUCI=y
          CONFIG_LUCI_BASE=y
          CONFIG_LUCI_APP_ADGUARDHOME=y
          CONFIG_LUCI_APP_FILEMANAGER=y
          CONFIG_LUCI_SSL=y
          CONFIG_ADGUARDHOME=y
          # IPQ6000 NPU 核心加速模块（必须保留）
          CONFIG_PACKAGE_kmod-qca-nss-drv=y
          # 移除非必需组件（适配 IPQ6000 精简）
          CONFIG_PACKAGE_curl=n
          CONFIG_PACKAGE_ds-lite=n
          CONFIG_PACKAGE_e2fsprogs=n
          CONFIG_PACKAGE_f2fs-tools=n
          CONFIG_PACKAGE_firewall4=n
          CONFIG_PACKAGE_htop=n
          CONFIG_PACKAGE_ipq-wifi-redmi_ax5=n
          CONFIG_PACKAGE_kmod-ath11k=n
          CONFIG_PACKAGE_kmod-ath11k-ahb=n
          CONFIG_PACKAGE_kmod-ath11k-pci=n
          CONFIG_PACKAGE_kmod-phy-aquantia=n
          CONFIG_PACKAGE_kmod-phy-qca83xx=n
          CONFIG_PACKAGE_kmod-qca-nss-drv-gre=n
          CONFIG_PACKAGE_kmod-qca-nss-drv-lag-mgr=n
          CONFIG_PACKAGE_kmod-qca-nss-drv-pptp=n
          CONFIG_PACKAGE_kmod-qca-nss-drv-vlan-mgr=n
          CONFIG_PACKAGE_kmod-qca-nss-drv-wifi-meshmgr=n
          CONFIG_PACKAGE_logd=n
          CONFIG_PACKAGE_losetup=n
          CONFIG_PACKAGE_luci-app-advancedplus=n
          CONFIG_PACKAGE_luci-app-firewall=n
          CONFIG_PACKAGE_luci-app-upnp=n
          CONFIG_PACKAGE_luci-app-wifihistory=n
          CONFIG_PACKAGE_nano=n
          CONFIG_PACKAGE_odhcp6c=n
          CONFIG_PACKAGE_odhcpd-ipv6only=n
          CONFIG_PACKAGE_ppp=n
          CONFIG_PACKAGE_ppp-mod-pppoe=n
          CONFIG_PACKAGE_resolveip=n
          CONFIG_PACKAGE_wget-ssl=n
          CONFIG_PACKAGE_wpad-mbedtls=n
          EOF
          # 加载配置并校验（适配 IPQ6000 驱动）
          make defconfig

      # 步骤4：编译固件（单线程，IPQ6000 编译更稳定）
      - name: Build Redmi AX5 Firmware
        run: |
          cd openwrt
          make -j1 V=s  # 单线程避免 IPQ6000 驱动编译崩溃

      # 步骤5：上传固件到 Releases（IPQ6000 专属命名）
      - name: Upload to Releases
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: Redmi-AX5-IPQ6000-$(date +%Y%m%d)
          files: |
            openwrt/bin/targets/ipq0501/generic/*.bin
          body: |
            Redmi AX5 (IPQ6000/IPQ0501) 极简固件
            - 适配高通 5核 IPQ6000 芯片（14nm A53 + NPU）
            - 仅保留有线网络 + AdGuardHome DNS 过滤
            - 启用 NPU 网络加速，内存占用 ≈120MB
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
